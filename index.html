<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Lama Stars</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /* ─── Base ─── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      overflow: hidden;
      background: #050510;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .font-arabic { font-family: 'Noto Naskh Arabic', serif; }

    /* ─── Sky Gradient ─── */
    #skyGradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(
        to bottom,
        #020212 0%,
        #050520 15%,
        #0a0a30 35%,
        #0d1040 55%,
        #111555 75%,
        #151a4a 88%,
        #1a1f3a 100%
      );
    }

    /* ─── Star Canvas ─── */
    #starfieldCanvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ─── Milky Way ─── */
    #milkyWayCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.35;
    }

    /* ─── Horizon Haze ─── */
    #horizonHaze {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 25%;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(
        to top,
        rgba(15, 18, 50, 0.8) 0%,
        rgba(12, 15, 45, 0.4) 40%,
        transparent 100%
      );
    }

    /* ─── Scene Silhouette ─── */
    #sceneCanvas {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 35%;
      z-index: 2;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }

    /* ─── Campfire glow overlay ─── */
    #fireGlow {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 200px;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 100%,
        rgba(255, 120, 20, 0.08) 0%,
        rgba(255, 80, 10, 0.04) 40%,
        transparent 70%
      );
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    /* ─── Screens ─── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 0.8s ease forwards; }
    .fade-out { animation: fadeOut 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

    /* ─── Sound Toggle ─── */
    .sound-btn {
      position: fixed;
      top: 16px; right: 16px;
      z-index: 100;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      width: 44px; height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      cursor: pointer;
      color: #e2e8f0;
      transition: background 0.2s;
    }
    .sound-btn:hover { background: rgba(255,255,255,0.15); }

    /* ─── Begin Button ─── */
    .glow-btn {
      padding: 14px 48px;
      border: none;
      border-radius: 9999px;
      font-size: 1.15rem;
      font-weight: 600;
      color: #0a0a2e;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      cursor: pointer;
      box-shadow: 0 0 30px rgba(251, 191, 36, 0.4), 0 0 60px rgba(251, 191, 36, 0.15);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      min-height: 44px;
      min-width: 44px;
    }
    .glow-btn:hover, .glow-btn:active {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(251, 191, 36, 0.6), 0 0 80px rgba(251, 191, 36, 0.25);
    }

    /* ─── Moon ─── */
    #moon {
      position: fixed;
      top: 8%;
      right: 10%;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(
        circle at 40% 40%,
        #fef9e7 0%,
        #fde68a 30%,
        #d4c479 60%,
        #b8a960 100%
      );
      box-shadow:
        inset -14px -2px 0 0 #050520,
        inset 3px 2px 8px rgba(255, 255, 255, 0.15),
        0 0 15px rgba(254, 243, 199, 0.5),
        0 0 40px rgba(254, 243, 199, 0.25),
        0 0 80px rgba(254, 243, 199, 0.1),
        0 0 120px rgba(254, 243, 199, 0.05);
      z-index: 2;
      pointer-events: none;
    }
    /* Earthshine — faint glow on the dark side */
    #moon::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(180, 200, 255, 0.06), transparent 70%);
      z-index: -1;
    }
    /* Subtle crater texture */
    #moon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 35%, rgba(0,0,0,0.08) 0%, transparent 6px),
        radial-gradient(circle at 55% 25%, rgba(0,0,0,0.06) 0%, transparent 4px),
        radial-gradient(circle at 40% 60%, rgba(0,0,0,0.07) 0%, transparent 5px),
        radial-gradient(circle at 25% 50%, rgba(0,0,0,0.05) 0%, transparent 3px),
        radial-gradient(circle at 45% 45%, rgba(0,0,0,0.04) 0%, transparent 8px);
    }

    /* ─── Shooting Stars ─── */
    #shootingStarContainer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .shooting-star {
      position: absolute;
      width: 120px;
      height: 2px;
      background: linear-gradient(to left,
        rgba(255, 255, 255, 0) 0%,
        rgba(200, 220, 255, 0.15) 20%,
        rgba(180, 210, 255, 0.5) 60%,
        rgba(220, 240, 255, 0.9) 90%,
        #fff 100%
      );
      border-radius: 2px;
      transform: rotate(var(--shoot-angle, -35deg));
      animation: shoot var(--shoot-duration, 1s) cubic-bezier(0.2, 0, 0.8, 1) forwards;
      filter: blur(0.3px);
    }
    .shooting-star::before {
      content: '';
      position: absolute;
      right: -1px;
      top: -2px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px 2px rgba(200, 220, 255, 0.8), 0 0 12px 4px rgba(200, 220, 255, 0.3);
    }
    @keyframes shoot {
      0% { opacity: 0; transform: rotate(var(--shoot-angle, -35deg)) translateX(0); }
      8% { opacity: 1; }
      75% { opacity: 0.8; }
      100% { opacity: 0; transform: rotate(var(--shoot-angle, -35deg)) translateX(500px); }
    }

    /* ─── Sky Screen ─── */
    #skyScreen {
      justify-content: flex-start;
      padding-top: 0;
    }
    #skyCanvas {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    /* ─── Tappable Stars ─── */
    .tappable-star {
      position: absolute;
      width: 44px;
      height: 44px;
      border: none;
      background: none;
      cursor: pointer;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      pointer-events: auto;
    }
    .tappable-star::before {
      content: '';
      width: var(--star-size, 5px);
      height: var(--star-size, 5px);
      border-radius: 50%;
      background: radial-gradient(circle,
        var(--star-core, #fff) 0%,
        var(--star-mid, rgba(200, 220, 255, 0.6)) 40%,
        transparent 70%
      );
      box-shadow:
        0 0 3px 1px var(--star-glow, rgba(200, 220, 255, 0.6)),
        0 0 8px 2px var(--star-glow, rgba(200, 220, 255, 0.3)),
        0 0 18px 4px var(--star-glow-outer, rgba(200, 220, 255, 0.1));
      animation: twinkle var(--twinkle-speed, 3s) ease-in-out infinite;
      animation-delay: var(--twinkle-delay, 0s);
      transition: transform 0.2s ease;
    }
    .tappable-star:active::before {
      transform: scale(1.6);
    }
    /* Four-point diffraction spike (subtle) */
    .tappable-star::after {
      content: '';
      position: absolute;
      width: 1px;
      height: var(--spike-size, 20px);
      background: linear-gradient(to bottom, transparent, var(--star-glow, rgba(200, 220, 255, 0.3)), transparent);
      box-shadow: none;
      opacity: 0.5;
      animation: twinkle var(--twinkle-speed, 3s) ease-in-out infinite;
      animation-delay: var(--twinkle-delay, 0s);
    }
    .tappable-star.collected {
      pointer-events: none;
    }
    .tappable-star.collected::before,
    .tappable-star.collected::after {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      25% { opacity: 0.85; transform: scale(1.05); }
      50% { opacity: 1; transform: scale(1.15); }
      75% { opacity: 0.7; transform: scale(0.95); }
    }

    /* ─── Star Counter ─── */
    #starCounter {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.05em;
    }

    /* ─── Big Heart ─── */
    #bigHeartWrap {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .big-heart-grid {
      display: grid;
      grid-template-columns: repeat(11, 6px);
      grid-template-rows: repeat(10, 6px);
      gap: 1px;
      transition: filter 0.5s ease;
    }
    .heart-pixel {
      width: 6px;
      height: 6px;
      border-radius: 1px;
      background-color: #1e1e4a;
      opacity: 0.3;
      transition: background-color 0.5s ease, opacity 0.5s ease;
    }

    /* ─── Heart Explosion ─── */
    @keyframes heartExplode {
      0% { transform: translateX(-50%) scale(1); opacity: 1; }
      50% { transform: translateX(-50%) scale(1.8); opacity: 0.8; }
      100% { transform: translateX(-50%) scale(2.5); opacity: 0; }
    }
    .explosion-particle {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      font-size: 1.2rem;
      animation: particleFly 1.5s ease-out forwards;
    }
    @keyframes particleFly {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0.3); }
    }

    /* ─── Fragment Flight ─── */
    #fragmentFlight {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }
    .flight-fragment {
      position: fixed;
      font-size: 0.9rem;
      color: #fbbf24;
      white-space: nowrap;
      pointer-events: none;
      z-index: 31;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.8);
      opacity: 0;
    }

    /* ─── Reveal Screen ─── */
    #revealScreen {
      z-index: 40;
      background: rgba(10, 10, 46, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #fragmentAssembly {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 8px;
      max-width: 340px;
      padding: 0 20px;
      min-height: 80px;
    }
    #fragmentAssembly[dir="rtl"] {
      direction: rtl;
    }
    .assembled-fragment {
      font-size: 1.3rem;
      color: #fbbf24;
      opacity: 0;
      transform: translate(var(--fromX, 0), var(--fromY, 0));
      transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease;
    }
    .assembled-fragment.in-place {
      opacity: 1;
      transform: translate(0, 0);
    }
    .reveal-btn {
      padding: 12px 36px;
      border: none;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: transform 0.2s ease, opacity 0.2s ease;
      opacity: 0;
    }
    .reveal-btn.visible {
      opacity: 1;
    }
    .reveal-btn:active {
      transform: scale(0.95);
    }
    #collectTrophyBtn {
      color: #0a0a2e;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
      margin-top: 32px;
    }
    #newRoundBtn {
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-top: 12px;
    }

    /* ─── Trophy Earned Animation ─── */
    .trophy-earned {
      font-size: 3rem;
      animation: trophyBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes trophyBounce {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ─── Trophy Screen ─── */
    #trophyScreen {
      justify-content: flex-start;
      padding-top: 60px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #trophyGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }
    .trophy-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 12px 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: background 0.2s, transform 0.2s;
      min-height: 44px;
      min-width: 44px;
    }
    .trophy-cell:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.08);
    }
    .trophy-icon {
      font-size: 1.8rem;
    }
    .trophy-date {
      font-size: 0.55rem;
      opacity: 0.4;
    }
    .trophy-empty {
      text-align: center;
      opacity: 0.5;
      font-size: 0.95rem;
      padding: 40px 20px;
      line-height: 1.6;
    }
    .trophy-shelf-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #fbbf24;
      margin-bottom: 8px;
    }

    /* ─── Trophy Modal ─── */
    #trophyModal {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(10, 10, 46, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
    }
    #trophyModalIcon {
      font-size: 3rem;
    }
    #trophyModalText {
      font-size: 1.2rem;
      text-align: center;
      line-height: 1.7;
      max-width: 320px;
      color: #fbbf24;
    }
    #trophyModalDate {
      font-size: 0.75rem;
      opacity: 0.4;
      margin-top: 4px;
    }
    #trophyModalClose {
      margin-top: 24px;
      padding: 10px 32px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.06);
      color: #e2e8f0;
      font-size: 0.9rem;
      cursor: pointer;
      min-height: 44px;
    }

    /* ─── Tab Bar ─── */
    #tabBar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      background: rgba(10, 10, 46, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 10px 0;
      border: none;
      background: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.7rem;
      cursor: pointer;
      transition: color 0.2s;
      min-height: 50px;
    }
    .tab-btn.active {
      color: #fbbf24;
    }
    .tab-btn .tab-icon {
      font-size: 1.3rem;
    }

    /* ─── Landscape ─── */
    @media (orientation: landscape) and (max-height: 500px) {
      #bigHeartWrap { bottom: 60px; }
      .big-heart-grid {
        grid-template-columns: repeat(11, 4px);
        grid-template-rows: repeat(10, 4px);
      }
      .heart-pixel { width: 4px; height: 4px; }
    }
  </style>
</head>
<body>
  <!-- Sky Gradient -->
  <div id="skyGradient"></div>

  <!-- Milky Way -->
  <canvas id="milkyWayCanvas"></canvas>

  <!-- Star Canvas -->
  <canvas id="starfieldCanvas"></canvas>

  <!-- Horizon Haze -->
  <div id="horizonHaze"></div>

  <!-- Scene Silhouette -->
  <canvas id="sceneCanvas"></canvas>

  <!-- Campfire glow -->
  <div id="fireGlow"></div>

  <!-- Sound Toggle -->
  <button id="soundToggle" class="sound-btn" aria-label="Toggle sound">&#x1F50A;</button>

  <!-- Moon -->
  <div id="moon" class="hidden"></div>

  <!-- Shooting Stars -->
  <div id="shootingStarContainer"></div>

  <!-- ═══ Welcome Screen ═══ -->
  <div id="welcomeScreen" class="screen">
    <div style="display:flex;flex-direction:column;align-items:center;gap:24px;padding:0 20px;">
      <h1 style="font-size:2.5rem;font-weight:600;color:#fbbf24;letter-spacing:-0.02em;">
        Lama Stars
      </h1>
      <p style="font-size:1.05rem;opacity:0.7;text-align:center;max-width:280px;line-height:1.6;">
        Pick the stars that call to you
      </p>
      <div style="margin-top:16px;">
        <button id="beginBtn" class="glow-btn">Begin</button>
      </div>
    </div>
  </div>

  <!-- ═══ Sky Screen ═══ -->
  <div id="skyScreen" class="screen hidden">
    <div id="skyCanvas"></div>
    <div id="starCounter"></div>
    <div id="bigHeartWrap">
      <div id="bigHeart" class="big-heart-grid"></div>
    </div>
  </div>

  <!-- Fragment Flight Overlay -->
  <div id="fragmentFlight"></div>

  <!-- ═══ Reveal Screen ═══ -->
  <div id="revealScreen" class="screen hidden">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <div id="fragmentAssembly"></div>
      <button id="collectTrophyBtn" class="reveal-btn">Collect Trophy</button>
      <button id="newRoundBtn" class="reveal-btn">Pick More Stars</button>
    </div>
  </div>

  <!-- ═══ Trophy Screen ═══ -->
  <div id="trophyScreen" class="screen hidden">
    <div class="trophy-shelf-title">Your Collection</div>
    <div id="trophyGrid"></div>
  </div>

  <!-- Trophy Modal -->
  <div id="trophyModal" class="hidden">
    <div id="trophyModalIcon"></div>
    <div id="trophyModalText"></div>
    <div id="trophyModalDate"></div>
    <button id="trophyModalClose">Close</button>
  </div>

  <!-- ═══ Tab Bar ═══ -->
  <div id="tabBar" class="hidden">
    <button class="tab-btn active" data-tab="sky">
      <span class="tab-icon">&#x2B50;</span>
      <span>Sky</span>
    </button>
    <button class="tab-btn" data-tab="collection">
      <span class="tab-icon">&#x1F3C6;</span>
      <span>Collection</span>
    </button>
  </div>

  <script src="messages.js"></script>
  <script src="app.js"></script>
</body>
</html>
